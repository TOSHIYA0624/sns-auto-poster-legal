<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E5ECFF"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1E1B4B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>

  <!-- subtle automation orbit arc -->
  <g stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="22" fill="none" stroke-linecap="round">
    <path d="M 760 300 A 300 300 0 1 1 300 760"/>
  </g>
  <!-- arrow head on the orbit (auto/refresh feel) -->
  <g fill="#FFFFFF" fill-opacity="0.55">
    <path d="M 300 760 l -8 -86 l 90 30 z"/>
  </g>

  <!-- paper plane (send) -->
  <g filter="url(#shadow)">
    <!-- main body -->
    <path d="M 742 300 L 304 506 L 486 560 L 560 742 Z" fill="url(#plane)"/>
    <!-- folded wing (darker) -->
    <path d="M 742 300 L 486 560 L 560 742 Z" fill="#C7D2FE"/>
    <!-- left fold line -->
    <path d="M 742 300 L 486 560 L 304 506 Z" fill="#FFFFFF"/>
  </g>
</svg>
