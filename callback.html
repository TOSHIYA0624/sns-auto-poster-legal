<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="shortcut icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="manifest" href="./site.webmanifest" />
  <meta name="theme-color" content="#6366F1" />
  <title>Authorization Callback - SNS Auto Poster</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; line-height: 1.7; color: #222; }
    h1 { font-size: 1.4rem; }
    .box { border: 1px solid #ccc; border-radius: 8px; padding: 16px; background: #f7f7f7; word-break: break-all; }
    .code { font-family: monospace; font-size: 1.05rem; color: #0a66c2; }
    button { margin-top: 12px; padding: 8px 16px; font-size: 1rem; cursor: pointer; border-radius: 6px; border: 1px solid #0a66c2; background: #0a66c2; color: #fff; }
    .err { color: #c00; }
    .muted { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Authorization code</h1>
  <p class="muted">Copy the code below and paste it back into the terminal running <code>npm run token:tiktok</code>.</p>
  <div class="box">
    <div id="out" class="code">Reading...</div>
  </div>
  <button id="copy" style="display:none">Copy code</button>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var error = params.get("error");
      var out = document.getElementById("out");
      var btn = document.getElementById("copy");
      if (error) {
        out.className = "err";
        out.textContent = "Authorization error: " + error + " — " + (params.get("error_description") || "");
        return;
      }
      if (code) {
        out.textContent = code;
        btn.style.display = "inline-block";
        btn.onclick = function () {
          navigator.clipboard.writeText(code).then(function () {
            btn.textContent = "Copied!";
          });
        };
      } else {
        out.className = "err";
        out.textContent = "No code found in URL.";
      }
    })();
  </script>
</body>
</html>
